version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.7"
  jobs:
    post_build:
      - python -m sphinx -T -b markdown -d _build/doctrees -D language=en source $READTHEDOCS_OUTPUT/markdown

sphinx:
  configuration: source/conf.py

formats:
  - htmlzip
  - pdf
  - epub

python:
  install:
    - requirements: requirements.txt